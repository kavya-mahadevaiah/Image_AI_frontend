<div class="h-full flex flex-col bg-gray-900 text-white">
  <div class="h-12 border-b border-gray-700 flex items-center px-4 shrink-0">
    <span class="font-semibold text-gray-200">AI Chat</span>
  </div>

  <div *ngIf="!image" class="flex-1 flex items-center justify-center text-gray-500 text-sm px-6 text-center">
    Select an image to start chatting about it
  </div>

  <ng-container *ngIf="image">
    <div
      *ngIf="image.status !== 'COMPLETED'"
      class="px-4 py-3 text-xs text-yellow-300 border-b border-gray-700 bg-gray-800"
    >
      Image is still processing. Chat may be limited until processing completes.
    </div>

    <div #messagesContainer class="flex-1 overflow-y-auto p-4 min-h-0">
      <div *ngIf="isLoadingHistory" class="text-gray-400 text-sm mb-3">
        Loading chat history...
      </div>

      <div *ngIf="!isLoadingHistory && messages.length === 0" class="text-gray-500 text-sm mb-3">
        No messages yet.
      </div>

      <div *ngFor="let msg of messages; trackBy: trackByMessageId" class="mb-3">
        <div
          [ngClass]="msg.role === 'user'
            ? 'ml-auto max-w-[85%] rounded-2xl px-4 py-3 text-sm bg-blue-600 text-white'
            : 'max-w-[85%] rounded-2xl px-4 py-3 text-sm bg-gray-700 text-gray-100'"
        >
          <div class="whitespace-pre-wrap break-words">{{ msg.content }}</div>
          <div class="mt-1 text-[10px] opacity-70">
            {{ msg.createdAt | date:'HH:mm' }}
          </div>
        </div>
      </div>

      <div *ngIf="errorMessage" class="text-red-400 text-sm">
        {{ errorMessage }}
      </div>
    </div>

    <div class="border-t border-gray-700 p-3 shrink-0">
      <div class="flex gap-2">
        <input
          [(ngModel)]="draftMessage"
          (keydown.enter)="sendMessage()"
          type="text"
          placeholder="Ask about this image..."
          class="flex-1 bg-gray-800 border border-gray-600 rounded-lg px-3 py-2 text-sm text-white outline-none focus:border-blue-500"
        />

       <button
  (click)="sendMessage()"
  [disabled]="!draftMessage.trim() || isSending || isLoadingHistory || image?.status !== 'COMPLETED'"
  class="bg-blue-600 hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed text-white px-4 py-2 rounded-lg text-sm font-medium"
>
  {{ isLoadingHistory ? 'Loading...' : isSending ? 'Sending...' : 'Send' }}
</button>
      </div>
    </div>
  </ng-container>
</div>
