<div class="min-h-screen bg-gray-900 flex items-center justify-center">
  <div class="bg-gray-800 p-8 rounded-xl shadow-lg w-full max-w-md">

    <h2 class="text-2xl font-bold text-white mb-6 text-center">Create Account</h2>

    <div *ngIf="errorMessage" class="bg-red-500 text-white p-3 rounded-lg mb-4 text-sm">
      {{ errorMessage }}
    </div>

    <form (ngSubmit)="onSubmit()">
      <div class="mb-4">
        <label class="block text-gray-400 text-sm mb-2">Name</label>
        <input
          type="text"
          [(ngModel)]="name"
          name="name"
          required
          class="w-full bg-gray-700 text-white px-4 py-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="Your name" />
      </div>

      <div class="mb-4">
        <label class="block text-gray-400 text-sm mb-2">Email</label>
        <input
          type="email"
          [(ngModel)]="email"
          name="email"
          required
          class="w-full bg-gray-700 text-white px-4 py-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="you@example.com" />
      </div>

      <div class="mb-6">
        <label class="block text-gray-400 text-sm mb-2">Password</label>
        <input
          type="password"
          [(ngModel)]="password"
          name="password"
          required
          class="w-full bg-gray-700 text-white px-4 py-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="••••••••" />
      </div>

      <button
        type="submit"
        [disabled]="isLoading"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition disabled:opacity-50">
        {{ isLoading ? 'Creating account...' : 'Register' }}
      </button>
    </form>

    <p class="text-gray-400 text-sm text-center mt-4">
      Already have an account?
      <a routerLink="/login" class="text-blue-400 hover:underline">Login</a>
    </p>

  </div>
</div>
