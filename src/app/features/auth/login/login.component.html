<div class="min-h-screen bg-gray-900 flex items-center justify-center">
  <div class="bg-gray-800 p-8 rounded-xl shadow-lg w-full max-w-md">

    <h2 class="text-2xl font-bold text-white mb-6 text-center">Welcome Back</h2>

    <div *ngIf="errorMessage" 
         class="bg-red-500 bg-opacity-20 border border-red-500 text-red-400 p-3 rounded-lg mb-4 text-sm flex items-center gap-2">
      <span>⚠</span>
      <span>{{ errorMessage }}</span>
    </div>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
      <div class="mb-4">
        <label class="block text-gray-400 text-sm mb-2">Email</label>
        <input
          type="email"
          [(ngModel)]="email"
          name="email"
          required
          email
          #emailField="ngModel"
          class="w-full bg-gray-700 text-white px-4 py-3 rounded-lg focus:outline-none focus:ring-2 transition"
          [class.focus:ring-blue-500]="!emailField.invalid || emailField.pristine"
          [class.ring-2]="emailField.invalid && emailField.touched"
          [class.ring-red-500]="emailField.invalid && emailField.touched"
          placeholder="you@example.com" />
        <p *ngIf="emailField.invalid && emailField.touched" class="text-red-400 text-xs mt-1">
          Please enter a valid email address.
        </p>
      </div>

      <div class="mb-6">
        <label class="block text-gray-400 text-sm mb-2">Password</label>
        <input
          type="password"
          [(ngModel)]="password"
          name="password"
          required
          #passwordField="ngModel"
          class="w-full bg-gray-700 text-white px-4 py-3 rounded-lg focus:outline-none focus:ring-2 transition"
          [class.ring-2]="passwordField.invalid && passwordField.touched"
          [class.ring-red-500]="passwordField.invalid && passwordField.touched"
          placeholder="••••••••" />
        <p *ngIf="passwordField.invalid && passwordField.touched" class="text-red-400 text-xs mt-1">
          Password is required.
        </p>
      </div>

      <button
        type="submit"
        [disabled]="isLoading"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition disabled:opacity-50 flex items-center justify-center gap-2">
        <span *ngIf="isLoading" class="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></span>
        {{ isLoading ? 'Logging in...' : 'Login' }}
      </button>
    </form>

    <p class="text-gray-400 text-sm text-center mt-4">
      Don't have an account?
      <a routerLink="/register" class="text-blue-400 hover:underline">Register</a>
    </p>

  </div>
</div>
